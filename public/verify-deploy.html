<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClawfice Deployment Verifier</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      padding: 40px 20px;
      min-height: 100vh;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      color: #94a3b8;
      margin-bottom: 40px;
      font-size: 16px;
    }
    
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .check-card {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s;
    }
    
    .check-card:hover {
      border-color: rgba(139, 92, 246, 0.4);
      transform: translateY(-2px);
    }
    
    .check-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .check-status {
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 6px;
      display: inline-block;
      margin-top: 8px;
    }
    
    .status-loading {
      background: rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }
    
    .status-pass {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }
    
    .status-fail {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }
    
    .check-detail {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 8px;
      line-height: 1.6;
    }
    
    .overall-status {
      background: rgba(30, 41, 59, 0.8);
      border: 2px solid;
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-top: 40px;
    }
    
    .overall-status.pass {
      border-color: rgba(34, 197, 94, 0.6);
    }
    
    .overall-status.fail {
      border-color: rgba(239, 68, 68, 0.6);
    }
    
    .overall-status h2 {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .overall-status p {
      font-size: 18px;
      color: #cbd5e1;
    }
    
    .refresh-btn {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s;
    }
    
    .refresh-btn:hover {
      transform: scale(1.05);
    }
    
    .refresh-btn:active {
      transform: scale(0.98);
    }
    
    .timestamp {
      text-align: center;
      color: #64748b;
      font-size: 14px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 OpenClawfice Deployment Verifier</h1>
    <p class="subtitle">Real-time verification of production deployment status</p>
    
    <div style="background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 8px; padding: 16px; margin-bottom: 24px;">
      <strong style="color: #60a5fa;">💡 Quick Verification:</strong> After fixing Vercel deployment, open this page at 
      <code style="background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 4px; color: #a5f3fc;">https://openclawfice.com/verify-deploy.html</code>
      to instantly confirm all features are live.
    </div>
    
    <div class="status-grid" id="checks">
      <!-- Checks will be inserted here -->
    </div>
    
    <div class="overall-status" id="overall">
      <h2>⏳</h2>
      <p>Running checks...</p>
      <button class="refresh-btn" onclick="runChecks()">🔄 Refresh Checks</button>
    </div>
    
    <div class="timestamp" id="timestamp"></div>
  </div>

  <script>
    const checks = [
      {
        id: 'security-badge',
        title: '🛡️ Security Badge (Header)',
        url: 'https://openclawfice.com',
        test: (html) => html.includes('MALWARE FREE'),
        passMsg: 'Security badge visible in header',
        failMsg: 'Badge missing - old build deployed'
      },
      {
        id: 'landing-security',
        title: '🔒 Landing Page Security Section',
        url: 'https://openclawfice.com/landing',
        test: (html) => html.includes('VERIFIED') && html.includes('MALWARE SCANNED'),
        passMsg: 'Security section with 4 verification cards',
        failMsg: 'Security section missing from landing page'
      },
      {
        id: 'demo-mode',
        title: '🎮 Demo Mode API',
        url: 'https://openclawfice.com/api/demo',
        test: (data) => data && data.agents && data.agents.length === 5,
        isJson: true,
        passMsg: '5 demo agents configured correctly',
        failMsg: 'Demo API broken or agents missing'
      },
      {
        id: 'main-app',
        title: '🏢 Main Application',
        url: 'https://openclawfice.com',
        test: (html) => html.includes('OPENCLAWFICE') && html.includes('Work Room'),
        passMsg: 'App loads with all core features',
        failMsg: 'App broken or missing core UI'
      },
      {
        id: 'readme-links',
        title: '📚 GitHub README Links',
        url: 'https://raw.githubusercontent.com/openclaw/openclawfice/main/README.md',
        test: (md) => !md.includes('](/)') && md.includes('docs/'),
        passMsg: 'All README links fixed (no root paths)',
        failMsg: 'Broken links still present'
      },
      {
        id: 'security-md',
        title: '📄 SECURITY.md Documentation',
        url: 'https://raw.githubusercontent.com/openclaw/openclawfice/main/SECURITY.md',
        test: (md) => md.includes('malware') && md.includes('CodeQL'),
        passMsg: 'Comprehensive security documentation',
        failMsg: 'Security docs missing or incomplete'
      }
    ];

    async function runCheck(check) {
      const cardEl = document.getElementById(check.id);
      const statusEl = cardEl.querySelector('.check-status');
      const detailEl = cardEl.querySelector('.check-detail');
      
      statusEl.className = 'check-status status-loading';
      statusEl.textContent = '⏳ Checking...';
      detailEl.textContent = 'Fetching from production...';

      try {
        const response = await fetch(check.url, {
          cache: 'no-store',
          headers: { 'Cache-Control': 'no-cache' }
        });
        
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const content = check.isJson ? await response.json() : await response.text();
        const passed = check.test(content);
        
        statusEl.className = `check-status status-${passed ? 'pass' : 'fail'}`;
        statusEl.textContent = passed ? '✅ PASS' : '❌ FAIL';
        detailEl.textContent = passed ? check.passMsg : check.failMsg;
        
        return passed;
      } catch (error) {
        statusEl.className = 'check-status status-fail';
        statusEl.textContent = '❌ ERROR';
        detailEl.textContent = `Failed to fetch: ${error.message}`;
        return false;
      }
    }

    async function runChecks() {
      const timestamp = document.getElementById('timestamp');
      timestamp.textContent = `Last checked: ${new Date().toLocaleString()}`;
      
      const overall = document.getElementById('overall');
      overall.className = 'overall-status';
      overall.querySelector('h2').textContent = '⏳';
      overall.querySelector('p').textContent = 'Running checks...';
      
      const results = await Promise.all(checks.map(check => runCheck(check)));
      const passCount = results.filter(r => r).length;
      const totalCount = results.length;
      const allPassed = passCount === totalCount;
      
      overall.className = `overall-status ${allPassed ? 'pass' : 'fail'}`;
      overall.querySelector('h2').textContent = allPassed ? '🎉' : '⚠️';
      overall.querySelector('p').textContent = allPassed
        ? `All ${totalCount} checks passed! Deployment successful.`
        : `${passCount}/${totalCount} checks passed. ${totalCount - passCount} issue(s) found.`;
    }

    // Initialize check cards
    function initChecks() {
      const container = document.getElementById('checks');
      container.innerHTML = checks.map(check => `
        <div class="check-card" id="${check.id}">
          <div class="check-title">
            ${check.title}
          </div>
          <div class="check-status status-loading">⏳ Pending</div>
          <div class="check-detail">Waiting to run...</div>
        </div>
      `).join('');
    }

    // Auto-run on load
    initChecks();
    runChecks();
    
    // Auto-refresh every 30 seconds
    setInterval(runChecks, 30000);
  </script>
</body>
</html>
